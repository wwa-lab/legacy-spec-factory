schema_version: "0.1"

# handoff_type is descriptive only and must not encode a target language or
# framework. The handoff is platform-agnostic; downstream Atlas skills decide
# the target. If the spec carries an approved `DEC-*` that names a target
# platform, it appears under `modernization_decisions[]` below, not here.
handoff_type: "legacy-spec-factory-to-atlas-sdd"

# Handoff Metadata
handoff_id: "HANDOFF-CREDIT-CHECK-2026-05-16"
handoff_date: "2026-05-16T14:32:00Z"
handoff_validator: "Claude Code / legacy-brd-to-sdd-handoff v0.1.0"

# Capability Identity
capability:
  id: "CAP-CREDIT-CHECK-001"
  name: "Credit Limit Enforcement"
  slug: "CREDIT-CHECK"
  owner:
    name: "John Smith"
    role: "Credit Policy Manager"
    email: "john.smith@company.com"

business_goal: "Prevent credit exposure on orders by ensuring no customer exceeds their authorized credit threshold"

scope:
  in_scope:
    - "Credit limit validation for online and phone orders"
    - "Rejection of orders that exceed customer credit limit"
    - "Error messaging and transaction logging"
  out_of_scope:
    - "Cash/check orders (no credit limit applies)"
    - "Internal admin overrides (separate process)"
    - "Credit limit modification or adjustment workflows"

# Handoff Status
status: "approved"  # approved | approved_with_non_blocking_tbd | blocked
gate_checklist:
  brd_approved: true
  brd_signed_by_sme: true
  spec_approved: true
  spec_signed_by_sme: true
  no_blocking_tbd: true
  all_rules_have_ac: true
  evidence_cleared: true
  traceability_complete: true

# Source Artifacts
source_artifacts:
  brd:
    id: "BRD-CREDIT-CHECK-001"
    path: "05_brds/CREDIT-CHECK/brd.md"
    status: "approved"
    approved_by:
      name: "John Smith"
      role: "Credit Policy Manager"
      date: "2026-05-15"
  spec:
    id: "SPEC-CREDIT-CHECK-001"
    path: "05_specs/CREDIT-CHECK/spec.yaml"
    status: "approved"
    approved_by:
      name: "John Smith"
      role: "Credit Policy Manager"
      date: "2026-05-15"
  module:
    id: "MODULE-CARD-AUTH-001"
    slug: "card-auth"
    path: "04_modules/card-auth/"

# Business Rules (copied unchanged from spec)
business_rules:
  - id: "BR-CREDIT-CHECK-001"
    statement: "System must reject orders where the order amount exceeds the customer's authorized credit limit"
    knowledge_type: "inferred_business_rule"
    evidence_ids:
      - "EV-CREDIT-CHECK-001"
      - "EV-CREDIT-CHECK-002"
    confidence: "high"
    review_status: "approved"

  - id: "BR-CREDIT-CHECK-002"
    statement: "Credit limit is read from CUSTPF using customer ID as key"
    knowledge_type: "observed_behavior"
    evidence_ids:
      - "EV-CREDIT-CHECK-003"
    confidence: "high"
    review_status: "approved"

# Acceptance Criteria (copied unchanged from spec)
acceptance_criteria:
  - id: "AC-CREDIT-CHECK-001"
    rule_id: "BR-CREDIT-CHECK-001"
    criterion: "Order is rejected with error code 42 when amount exceeds limit"
    how_to_test: "Submit order with amount > customer limit; verify error code 42 returned"
    priority: "P0"
    review_status: "approved"

  - id: "AC-CREDIT-CHECK-002"
    rule_id: "BR-CREDIT-CHECK-001"
    criterion: "Error message 'Credit limit exceeded' is returned to caller"
    how_to_test: "Verify ERRMSG field contains 'Credit limit exceeded'"
    priority: "P0"
    review_status: "approved"

  - id: "AC-CREDIT-CHECK-003"
    rule_id: "BR-CREDIT-CHECK-002"
    criterion: "Credit limit is correctly read from CUSTPF customer master file"
    how_to_test: "Query CUSTPF for test customer; verify CRDLIM field matches system value"
    priority: "P0"
    review_status: "approved"

# Modernization Decisions
modernization_decisions:
  - id: "DEC-CREDIT-CHECK-001"
    decision: "Implement credit check as a reusable Spring Boot service"
    rationale: "Allows order entry, billing, and other bounded contexts to call the service independently"
    trade_off: "Service boundary adds network hop vs. monolithic implementation"
    impact: "Enables independent scaling and testing of credit business logic"
    review_status: "approved"

  - id: "DEC-CREDIT-CHECK-002"
    decision: "Use PostgreSQL CUSTMSTR table as the system-of-record for credit limits"
    rationale: "CUSTMSTR is the master data source in legacy; preserved for accuracy"
    trade_off: "Synchronization required if credit limits are changed outside the system"
    impact: "Simplifies data migration; one source of truth maintained"
    review_status: "approved"

# Data Model
data_model:
  entities:
    - legacy_name: "CUSTPF"
      target_name: "Customer"
      target_table: "CUSTMSTR"
      fields:
        - legacy_field: "CUSTID"
          target_field: "customer_id"
          type: "varchar(10)"
          notes: "Customer identifier; primary key"
        - legacy_field: "CRDLIM"
          target_field: "credit_limit"
          type: "decimal(9,2)"
          notes: "Authorized credit limit"
        - legacy_field: "CRDUSD"
          target_field: "credit_used"
          type: "decimal(9,2)"
          notes: "Amount of credit currently in use (open orders + invoices)"

# Inputs to the Capability
inputs:
  - id: "IN-CREDIT-CHECK-001"
    name: "Order"
    source: "order-entry-service"
    required_fields:
      - "customer_id"
      - "order_amount"
      - "order_type"
    data_type: "JSON"
    notes: "Incoming order request from order-entry service"

# Outputs of the Capability
outputs:
  - id: "OUT-CREDIT-CHECK-001"
    name: "Credit Decision"
    target: "order-entry-service"
    fields:
      - "decision" # approve | reject
      - "reason" # if rejected
      - "available_credit" # remaining credit after this order
    data_type: "JSON"
    notes: "Credit check result; used to accept or reject order"

# Exceptions and Error Handling
exceptions:
  - id: "EX-CREDIT-CHECK-001"
    condition: "Customer record not found in CUSTMSTR"
    expected_behavior: "Return error code 99 (customer not found) to caller"
    handling: "Service returns 400 BadRequest with error message"
    severity: "error"

  - id: "EX-CREDIT-CHECK-002"
    condition: "Order amount is zero or negative"
    expected_behavior: "Treat as non-credit order; no limit check needed"
    handling: "Service returns approval without credit limit validation"
    severity: "info"

# Test Cases (if planned)
test_cases:
  - id: "TC-CREDIT-CHECK-001"
    title: "Order approved when amount is below credit limit"
    acceptance_criteria:
      - "AC-CREDIT-CHECK-001"
      - "AC-CREDIT-CHECK-002"
    golden_master_enabled: true
    legacy_transaction: "CARDTEST001"

  - id: "TC-CREDIT-CHECK-002"
    title: "Order rejected when amount exceeds credit limit"
    acceptance_criteria:
      - "AC-CREDIT-CHECK-001"
    golden_master_enabled: true
    legacy_transaction: "CARDTEST002"

  - id: "TC-CREDIT-CHECK-003"
    title: "Customer not found error"
    acceptance_criteria:
      - "EX-CREDIT-CHECK-001"
    golden_master_enabled: false
    legacy_transaction: null
    notes: "Error case; may not have legacy equivalent"

# Evidence Records (all linked evidence)
evidence:
  - id: "EV-CREDIT-CHECK-001"
    type: "program_analysis"
    source: "02_programs/CREDIT-CHECK/program-analysis.md"
    sensitivity: "public"
    redaction_status: "not_required"
