    source: "03_flows/CREDIT-CHECK/credit-check-auth/flow.md"
    sensitivity: "internal"
    redaction_status: "reviewed"
    redacted_filename: "03_flows/CREDIT-CHECK/credit-check-auth/flow.md"
    source_path_verified: true
    redaction_required: false
    sme_required: false
    sme_approval: false

evidence_summary:
  total_evidence_items: 3
  cleared_for_distribution: 3
  evidence_ids:
    - "EV-CREDIT-CHECK-001"
    - "EV-CREDIT-CHECK-002"
    - "EV-CREDIT-CHECK-003"

# Open Questions (non-blocking TBDs)
open_questions:
  - id: "TBD-CREDIT-CHECK-001"
    question: "Should the system apply a daily credit limit in addition to the per-order limit?"
    knowledge_type: "unknown_tbd"
    blocking: false
    resolution: "Deferred to Phase 2 by John Smith, Credit Policy Manager"
    resolver: "John Smith"
    planned_resolution_date: "2026-06-30"
    notes: "Not in scope for Phase 1; current system has no daily limit; revisit after Go-Live"

# Assumptions Carried Forward from Spec / BRD
#
# Only assumptions explicitly recorded in the upstream BRD or spec appear
# here. This skill does NOT mint new assumptions during validation. Each
# entry's `source` names the upstream artefact and section that originated
# it.
assumptions:
  - assumption: "CUSTPF contains all active and inactive customer records; service will query live"
    rationale: "Customer master is System of Record; all credit decisions depend on CUSTPF"
    impact: "Downstream service must handle missing customer gracefully (error 99)"
    source: "05_specs/CREDIT-CHECK/spec.yaml#assumptions[0]"

  - assumption: "Credit limit values in CUSTPF are always valid decimal(9,2)"
    rationale: "Observed in all analyzed transactions; DDS confirms numeric(9,2)"
    impact: "No currency conversion needed; all comparisons are numeric"
    source: "05_specs/CREDIT-CHECK/spec.yaml#assumptions[1]"

