<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Module-First BRD Factory with IEOV validation</title>
  <desc id="desc">A module-first IBM i modernization BRD factory diagram showing module context from reviewed flows or normalized documents/specs, gap enrichment, IEOV conversion, supplemental evidence, and trusted BRD package output.</desc>
  <defs>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b2638"/>
      <stop offset="100%" stop-color="#071724"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#402914"/>
      <stop offset="100%" stop-color="#101a24"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11352c"/>
      <stop offset="100%" stop-color="#071724"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#221f46"/>
      <stop offset="100%" stop-color="#071724"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#20c8ff"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f4a83a"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4bd39c"/>
    </marker>
    <style>
      .bg { fill: #06131f; }
      .grid { stroke: #12324a; stroke-width: 1; opacity: 0.35; }
      .panel { fill: url(#panelGrad); stroke: #089fd4; stroke-width: 2; }
      .panelSoft { fill: #091d2d; stroke: #14506d; stroke-width: 1.5; }
      .tile { fill: #10293a; stroke: #1bb7ee; stroke-width: 1.5; }
      .tileGold { fill: url(#goldGrad); stroke: #f0a43a; stroke-width: 1.7; }
      .tileGreen { fill: url(#greenGrad); stroke: #4bd39c; stroke-width: 1.7; }
      .tilePurple { fill: url(#purpleGrad); stroke: #ad95ff; stroke-width: 1.7; }
      .tileDark { fill: #081927; stroke: #2b5369; stroke-width: 1.2; }
      .tag { fill: #0b2030; stroke: #164a68; stroke-width: 1.2; }
      .title { font: 800 43px Arial, Helvetica, sans-serif; fill: #f2f8ff; }
      .subtitle { font: 700 17px Arial, Helvetica, sans-serif; fill: #a9bdd0; letter-spacing: 1px; }
      .kicker { font: 800 21px Arial, Helvetica, sans-serif; fill: #f4b04c; }
      .h1 { font: 800 24px Arial, Helvetica, sans-serif; fill: #23c8ff; }
      .h2 { font: 800 19px Arial, Helvetica, sans-serif; fill: #eff8ff; }
      .h3 { font: 800 15px Arial, Helvetica, sans-serif; fill: #f2f8ff; }
      .body { font: 600 13px Arial, Helvetica, sans-serif; fill: #b8c7d5; }
      .small { font: 600 11.5px Arial, Helvetica, sans-serif; fill: #93a6b7; }
      .tiny { font: 600 10px Arial, Helvetica, sans-serif; fill: #8196a8; }
      .cn { font: 700 15px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #b9c9d7; }
      .cnSmall { font: 600 12px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #9fb3c5; }
      .goldText { fill: #f4b04c; }
      .greenText { fill: #70e2ad; }
      .purpleText { fill: #c7b7ff; }
      .line { fill: none; stroke: #20c8ff; stroke-width: 3; marker-end: url(#arrowCyan); }
      .lineGold { fill: none; stroke: #f4a83a; stroke-width: 3; marker-end: url(#arrowGold); }
      .lineGreen { fill: none; stroke: #4bd39c; stroke-width: 2.5; marker-end: url(#arrowGreen); }
      .dash { fill: none; stroke: #4bd39c; stroke-width: 2.5; stroke-dasharray: 7 7; marker-end: url(#arrowGreen); }
      .dashCyan { fill: none; stroke: #20c8ff; stroke-width: 2.2; stroke-dasharray: 7 7; marker-end: url(#arrowCyan); }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1120"/>
  <g opacity="0.35">
    <path class="grid" d="M40 150 H1760 M40 290 H1760 M40 430 H1760 M40 570 H1760 M40 710 H1760 M40 850 H1760 M40 990 H1760"/>
    <path class="grid" d="M180 40 V1080 M360 40 V1080 M540 40 V1080 M720 40 V1080 M900 40 V1080 M1080 40 V1080 M1260 40 V1080 M1440 40 V1080 M1620 40 V1080"/>
  </g>

  <g>
    <path d="M592 18 H1208 L1184 66 H616 Z" class="tag"/>
    <text x="900" y="49" text-anchor="middle" class="kicker">Diagram A - BRD Factory Logic</text>
    <text x="900" y="103" text-anchor="middle" class="title">MODULE-FIRST BRD FACTORY</text>
    <text x="900" y="132" text-anchor="middle" class="subtitle">MODULE DOCS / FLOWS + SUPPLEMENTAL EVIDENCE + IEOV VALIDATION TO TRUSTED BRD PACKAGE</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="42" y="168" width="330" height="590" rx="8" class="panel"/>
    <text x="70" y="206" class="h1">A1 Module Context</text>
    <text x="70" y="231" class="cn">模块上下文主干</text>

    <g transform="translate(70 266)">
      <rect width="260" height="62" rx="6" class="tileGold"/>
      <text x="20" y="25" class="h3">Operation / Business Flow</text>
      <text x="20" y="46" class="small">actors, events, exception path</text>
    </g>
    <g transform="translate(70 348)">
      <rect width="260" height="62" rx="6" class="tileGold"/>
      <text x="20" y="25" class="h3">System Flow</text>
      <text x="20" y="46" class="small">upstream, downstream, jobs</text>
    </g>
    <g transform="translate(70 430)">
      <rect width="260" height="62" rx="6" class="tileGold"/>
      <text x="20" y="25" class="h3">Program Flow</text>
      <text x="20" y="46" class="small">A -> B -> C, branch, call chain</text>
    </g>
    <g transform="translate(70 512)">
      <rect width="260" height="62" rx="6" class="tileGold"/>
      <text x="20" y="25" class="h3">Data Flow</text>
      <text x="20" y="46" class="small">PF/LF CRUD, field semantics</text>
    </g>
    <g transform="translate(70 594)">
      <rect width="260" height="62" rx="6" class="tileGold"/>
      <text x="20" y="25" class="h3">Docs / Specs / Code</text>
      <text x="20" y="46" class="small">evidence context, not intent</text>
    </g>

    <rect x="70" y="690" width="260" height="42" rx="6" class="tileDark"/>
    <text x="200" y="715" text-anchor="middle" class="cnSmall">Module is the understanding boundary</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="410" y="184" width="290" height="278" rx="8" class="panel"/>
    <text x="438" y="222" class="h1">A2 Gap Register</text>
    <text x="438" y="247" class="cn">未知点和冲突登记</text>
    <g transform="translate(438 279)">
      <rect width="226" height="34" rx="5" class="tileDark"/>
      <text x="16" y="22" class="body">unknown business meaning</text>
    </g>
    <g transform="translate(438 323)">
      <rect width="226" height="34" rx="5" class="tileDark"/>
      <text x="16" y="22" class="body">missing sub-functions</text>
    </g>
    <g transform="translate(438 367)">
      <rect width="226" height="34" rx="5" class="tileDark"/>
      <text x="16" y="22" class="body">weak evidence / conflicts</text>
    </g>
    <g transform="translate(438 411)">
      <rect width="226" height="34" rx="5" class="tileDark"/>
      <text x="16" y="22" class="body">open questions / TBD</text>
    </g>
  </g>

  <g filter="url(#softShadow)">
    <rect x="410" y="492" width="290" height="266" rx="8" class="panel"/>
    <text x="438" y="530" class="h1">A2 Evidence Layer</text>
    <text x="438" y="555" class="cn">补充证据层，不是最终裁决</text>
    <g transform="translate(438 584)">
      <rect width="226" height="34" rx="5" class="tileGreen"/>
      <text x="16" y="22" class="body">RAG knowledge docs</text>
    </g>
    <g transform="translate(438 628)">
      <rect width="226" height="34" rx="5" class="tileGreen"/>
      <text x="16" y="22" class="body">Runtime / reports / spool</text>
    </g>
    <g transform="translate(438 672)">
      <rect width="226" height="34" rx="5" class="tileGreen"/>
      <text x="16" y="22" class="body">Dictionary / ARCAD impact</text>
    </g>
    <g transform="translate(438 716)">
      <rect width="226" height="28" rx="5" class="tileGreen"/>
      <text x="16" y="19" class="small">source snippets, screens, samples</text>
    </g>
  </g>

  <g filter="url(#softShadow)">
    <rect x="735" y="168" width="705" height="590" rx="8" class="panel"/>
    <text x="763" y="206" class="h1">A3 IEOV Conversion Workbench</text>
    <text x="763" y="231" class="cn">把 flow/program 证据切片转成可审阅 BRD 构件</text>

    <g transform="translate(762 268)">
      <rect width="152" height="416" rx="8" class="tile"/>
      <circle cx="76" cy="42" r="24" fill="#0e3650" stroke="#23c8ff" stroke-width="2"/>
      <text x="76" y="50" text-anchor="middle" class="h2">I</text>
      <text x="76" y="91" text-anchor="middle" class="h2">INPUT</text>
      <text x="18" y="132" class="small">Module scope + CAP seed</text>
      <text x="18" y="164" class="small">4-view module analysis</text>
      <text x="18" y="196" class="small">Flow / program evidence</text>
      <text x="18" y="228" class="small">EV / BEH / BR seeds</text>
      <text x="18" y="260" class="small">RAG and runtime gaps</text>
      <rect x="18" y="316" width="116" height="62" rx="6" class="tileDark"/>
      <text x="76" y="342" text-anchor="middle" class="tiny">what we know</text>
      <text x="76" y="360" text-anchor="middle" class="tiny">and what is missing</text>
    </g>

    <g transform="translate(930 268)">
      <rect width="152" height="416" rx="8" class="tile"/>
      <circle cx="76" cy="42" r="24" fill="#4a2c13" stroke="#f4a83a" stroke-width="2"/>
      <text x="76" y="50" text-anchor="middle" class="h2">E</text>
      <text x="76" y="91" text-anchor="middle" class="h2">EXECUTION</text>
      <text x="18" y="132" class="small">slice flow into behaviors</text>
      <text x="18" y="164" class="small">lift BEH-* observed facts</text>
      <text x="18" y="196" class="small">aggregate BR-* seeds</text>
      <text x="18" y="228" class="small">draft VAL-* scenarios</text>
      <text x="18" y="260" class="small">surface TBD / conflict</text>
      <rect x="18" y="316" width="116" height="62" rx="6" class="tileDark"/>
      <text x="76" y="342" text-anchor="middle" class="tiny">program-level</text>
      <text x="76" y="360" text-anchor="middle" class="tiny">is evidence, not BRD</text>
    </g>

    <g transform="translate(1098 268)">
      <rect width="152" height="416" rx="8" class="tile"/>
      <circle cx="76" cy="42" r="24" fill="#242653" stroke="#ad95ff" stroke-width="2"/>
      <text x="76" y="50" text-anchor="middle" class="h2">O</text>
      <text x="76" y="91" text-anchor="middle" class="h2">OUTPUT</text>
      <text x="18" y="132" class="small">brd.md</text>
      <text x="18" y="164" class="small">brd-review.md</text>
      <text x="18" y="196" class="small">validation-scenarios.md</text>
      <text x="18" y="228" class="small">traceability.md</text>
      <text x="18" y="260" class="small">open questions</text>
      <rect x="18" y="316" width="116" height="62" rx="6" class="tileDark"/>
      <text x="76" y="342" text-anchor="middle" class="tiny">one capability</text>
      <text x="76" y="360" text-anchor="middle" class="tiny">one BRD package</text>
    </g>

    <g transform="translate(1266 268)">
      <rect width="152" height="416" rx="8" class="tile"/>
      <circle cx="76" cy="42" r="24" fill="#123c2e" stroke="#4bd39c" stroke-width="2"/>
      <text x="76" y="50" text-anchor="middle" class="h2">V</text>
      <text x="76" y="91" text-anchor="middle" class="h2">VALIDATION</text>
      <text x="18" y="132" class="small">mechanical ID checks</text>
      <text x="18" y="164" class="small">evidence traceability</text>
      <text x="18" y="196" class="small">AI semantic review</text>
      <text x="18" y="228" class="small">SME decision / sign-off</text>
      <text x="18" y="260" class="small">pass | warn | blocked</text>
      <rect x="18" y="316" width="116" height="62" rx="6" class="tileDark"/>
      <text x="76" y="342" text-anchor="middle" class="tiny">no silent gaps</text>
      <text x="76" y="360" text-anchor="middle" class="tiny">no unsupported rule</text>
    </g>

    <path d="M914 477 H930" class="lineGold"/>
    <path d="M1082 477 H1098" class="lineGold"/>
    <path d="M1250 477 H1266" class="lineGold"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1470" y="184" width="288" height="574" rx="8" class="panel"/>
    <text x="1498" y="222" class="h1">A4 Trusted BRD Package</text>
    <text x="1498" y="247" class="cn">可信 BRD 交付包</text>

    <g transform="translate(1498 286)">
      <rect width="222" height="58" rx="6" class="tilePurple"/>
      <text x="18" y="24" class="h3">Observed Behavior</text>
      <text x="18" y="44" class="small">what the IBM i system does</text>
    </g>
    <g transform="translate(1498 360)">
      <rect width="222" height="58" rx="6" class="tilePurple"/>
      <text x="18" y="24" class="h3">Business Rule Seeds</text>
      <text x="18" y="44" class="small">why / policy, SME-reviewed</text>
    </g>
    <g transform="translate(1498 434)">
      <rect width="222" height="58" rx="6" class="tilePurple"/>
      <text x="18" y="24" class="h3">Validation Scenarios</text>
      <text x="18" y="44" class="small">VAL-* seeds, not formal TC</text>
    </g>
    <g transform="translate(1498 508)">
      <rect width="222" height="58" rx="6" class="tilePurple"/>
      <text x="18" y="24" class="h3">Traceability Matrix</text>
      <text x="18" y="44" class="small">BRD claim -> BEH / EV / TBD</text>
    </g>
    <g transform="translate(1498 594)">
      <rect width="222" height="96" rx="6" class="tileGreen"/>
      <text x="18" y="27" class="h3">Confidence Gate</text>
      <text x="18" y="51" class="small">approved</text>
      <text x="18" y="70" class="small">approved with non-blocking TBD</text>
      <text x="18" y="89" class="small">blocked pending evidence / SME</text>
    </g>
  </g>

  <path d="M372 465 C390 465 392 323 410 323" class="lineGold"/>
  <path d="M700 323 H735" class="line"/>
  <path d="M700 625 C718 625 718 506 735 506" class="dash"/>
  <path d="M1440 475 H1470" class="line"/>
  <path d="M555 492 V462" class="dash"/>

  <g filter="url(#softShadow)">
    <rect x="42" y="806" width="1716" height="156" rx="8" class="panelSoft"/>
    <text x="70" y="842" class="h1">Granularity Model</text>
    <text x="70" y="868" class="cn">Module 定边界；Capability 出 BRD</text>
    <text x="70" y="894" class="cnSmall">Program / Flow 是证据颗粒度</text>

    <g transform="translate(358 824)">
      <rect width="192" height="86" rx="8" class="tileGold"/>
      <text x="96" y="31" text-anchor="middle" class="h2">Module</text>
      <text x="96" y="56" text-anchor="middle" class="small">understanding boundary</text>
      <text x="96" y="73" text-anchor="middle" class="tiny">four-view model</text>
    </g>
    <g transform="translate(610 824)">
      <rect width="192" height="86" rx="8" class="tilePurple"/>
      <text x="96" y="31" text-anchor="middle" class="h2">Capability</text>
      <text x="96" y="56" text-anchor="middle" class="small">BRD output unit</text>
      <text x="96" y="73" text-anchor="middle" class="tiny">one CAP-* package</text>
    </g>
    <g transform="translate(862 824)">
      <rect width="192" height="86" rx="8" class="tile"/>
      <text x="96" y="31" text-anchor="middle" class="h2">Flow</text>
      <text x="96" y="56" text-anchor="middle" class="small">transaction slice</text>
      <text x="96" y="73" text-anchor="middle" class="tiny">trigger to outcome</text>
    </g>
    <g transform="translate(1114 824)">
      <rect width="192" height="86" rx="8" class="tile"/>
      <text x="96" y="31" text-anchor="middle" class="h2">Program / Object</text>
      <text x="96" y="56" text-anchor="middle" class="small">evidence granularity</text>
      <text x="96" y="73" text-anchor="middle" class="tiny">source, PF/LF, logs</text>
    </g>
    <g transform="translate(1366 824)">
      <rect width="192" height="86" rx="8" class="tileGreen"/>
      <text x="96" y="31" text-anchor="middle" class="h2">Claim IDs</text>
      <text x="96" y="56" text-anchor="middle" class="small">EV / BEH / BR / TBD</text>
      <text x="96" y="73" text-anchor="middle" class="tiny">traceable confidence</text>
    </g>
    <path d="M550 867 H610" class="line"/>
    <path d="M802 867 H862" class="line"/>
    <path d="M1054 867 H1114" class="line"/>
    <path d="M1306 867 H1366" class="line"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="42" y="988" width="1716" height="78" rx="8" class="panel"/>
    <text x="70" y="1023" class="h2">Key Message</text>
    <text x="246" y="1024" class="body">We do not let RAG generate the BRD. Reviewed module context defines the backbone; docs/specs/RAG/runtime/reports fill gaps; IEOV + SME review make every BRD claim traceable.</text>
    <text x="246" y="1051" class="cnSmall">A1-A4 的执行支撑见 Diagram B：每个阶段都有对应 skills、产物和 gate。</text>
  </g>
</svg>
