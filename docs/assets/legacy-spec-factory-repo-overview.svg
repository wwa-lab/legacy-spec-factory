<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-labelledby="title desc">
  <title id="title">Legacy Spec Factory repository overview</title>
  <desc id="desc">A repository structure map showing skills, documentation, templates, schemas, scripts, adapters, and the modernization workflow.</desc>
  <defs>
    <style>
      .bg { fill: #fffaf0; }
      .ink { fill: #1f252d; }
      .muted { fill: #5b6573; }
      .blue { fill: #0f4c81; }
      .green { fill: #1f7a5a; }
      .orange { fill: #b36b00; }
      .purple { fill: #7048a8; }
      .panel { fill: #ffffff; stroke: #1d3557; stroke-width: 3.5; rx: 18; }
      .panel-green { fill: #f1fbf6; stroke: #1f7a5a; stroke-width: 3; rx: 16; }
      .panel-orange { fill: #fff7e6; stroke: #b36b00; stroke-width: 3; rx: 16; }
      .panel-purple { fill: #f7f3ff; stroke: #7048a8; stroke-width: 3; rx: 16; }
      .chip { fill: #eef5ff; stroke: #0f4c81; stroke-width: 2; rx: 12; }
      .line { stroke: #20242a; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke: #5b6573; stroke-width: 2.5; fill: none; stroke-dasharray: 9 8; }
      .title { font: 700 46px "Avenir Next", "Helvetica Neue", Arial, sans-serif; letter-spacing: 0; }
      .h2 { font: 700 28px "Avenir Next", "Helvetica Neue", Arial, sans-serif; }
      .h3 { font: 700 21px "Avenir Next", "Helvetica Neue", Arial, sans-serif; }
      .body { font: 500 18px "Avenir Next", "Helvetica Neue", Arial, sans-serif; }
      .small { font: 500 15px "Avenir Next", "Helvetica Neue", Arial, sans-serif; }
      .tiny { font: 600 13px "Avenir Next", "Helvetica Neue", Arial, sans-serif; }
      .mono { font: 600 16px "SFMono-Regular", Consolas, monospace; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#20242a"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <path class="dash" d="M58 86 C260 62 440 82 650 70 S1060 58 1250 78 1450 96 1544 72"/>
  <text x="70" y="70" class="title ink">Legacy Spec Factory Repository Overview</text>
  <text x="72" y="108" class="body muted">Portable skill family for IBM i / AS400 modernization: canonical source, shared governance, synced runtime adapters.</text>

  <rect x="55" y="150" width="470" height="235" class="panel-green"/>
  <text x="88" y="192" class="h2 green">skills/</text>
  <text x="88" y="224" class="body ink">Canonical skill source</text>
  <text x="88" y="255" class="small muted">19 accepted skills across 6 families</text>
  <text x="88" y="283" class="small muted">Layer 1 IBM i extraction: 8</text>
  <text x="88" y="309" class="small muted">Layer 2 synthesis: 3</text>
  <text x="88" y="335" class="small muted">Bridge, governance, routing, verification: 8</text>
  <rect x="340" y="176" width="145" height="40" class="chip"/>
  <text x="363" y="202" class="tiny blue">19 SKILLS</text>
  <rect x="340" y="228" width="145" height="40" fill="#e7f6ef" stroke="#1f7a5a" stroke-width="2" rx="12"/>
  <text x="359" y="254" class="tiny green">10 FIELD</text>
  <rect x="340" y="280" width="145" height="40" fill="#fff5db" stroke="#b36b00" stroke-width="2" rx="12"/>
  <text x="365" y="306" class="tiny orange">9 REPO</text>

  <rect x="565" y="150" width="470" height="235" class="panel"/>
  <text x="598" y="192" class="h2 blue">docs/</text>
  <text x="598" y="224" class="body ink">Review and operating truth</text>
  <text x="598" y="255" class="small muted">skill-status-truth-table.md is the status source</text>
  <text x="598" y="283" class="small muted">runtime-matrix.md records Codex, Claude Code, OpenCode</text>
  <text x="598" y="309" class="small muted">reviews/ holds scorecards and field-pilot gates</text>
  <text x="598" y="335" class="small muted">ID, evidence taxonomy, redaction, and pipeline docs</text>

  <rect x="1075" y="150" width="470" height="235" class="panel-orange"/>
  <text x="1108" y="192" class="h2 orange">templates/ + schemas/</text>
  <text x="1108" y="224" class="body ink">Stable contracts for agents</text>
  <text x="1108" y="255" class="small muted">spec.yaml and spec schema</text>
  <text x="1108" y="283" class="small muted">scorecard templates and review contracts</text>
  <text x="1108" y="309" class="small muted">machine-readable handoff expectations</text>
  <text x="1108" y="335" class="small muted">keeps BRD, spec, tests, and traceability aligned</text>

  <rect x="55" y="420" width="470" height="205" class="panel-purple"/>
  <text x="88" y="462" class="h2 purple">scripts/</text>
  <text x="88" y="494" class="body ink">Automation and drift checks</text>
  <text x="88" y="525" class="small muted">sync-skills.sh creates runtime adapter copies</text>
  <text x="88" y="551" class="small muted">verify-skill-claims.py checks README, matrix, scorecards</text>
  <text x="88" y="577" class="small muted">contract scripts validate structured outputs</text>

  <rect x="565" y="420" width="470" height="205" class="panel"/>
  <text x="598" y="462" class="h2 blue">Runtime adapters</text>
  <text x="598" y="494" class="body ink">Synced copies, not source of truth</text>
  <text x="598" y="525" class="mono muted">.claude/skills/</text>
  <text x="598" y="551" class="mono muted">.codex/skills/</text>
  <text x="598" y="577" class="mono muted">.opencode/skills/  .agents/skills/</text>

  <rect x="1075" y="420" width="470" height="205" class="panel-green"/>
  <text x="1108" y="462" class="h2 green">Latest new skill</text>
  <text x="1108" y="494" class="mono ink">legacy-ibmi-runtime-evidence-miner</text>
  <text x="1108" y="525" class="small muted">Field-pilot ready v0.1.0, score 9.57</text>
  <text x="1108" y="551" class="small muted">Mines approved job logs and spool/report evidence</text>
  <text x="1108" y="577" class="small muted">Outputs runtime-evidence.jsonl for downstream analysis</text>

  <rect x="55" y="680" width="1490" height="132" fill="#ffffff" stroke="#1d3557" stroke-width="3.5" rx="18"/>
  <text x="88" y="724" class="h2 blue">End-to-End Chain</text>

  <rect x="88" y="752" width="160" height="40" class="chip"/>
  <text x="107" y="777" class="tiny blue">Evidence Intake</text>
  <line x1="250" y1="772" x2="292" y2="772" class="line" marker-end="url(#arrow)"/>

  <rect x="300" y="752" width="130" height="40" class="chip"/>
  <text x="330" y="777" class="tiny blue">Inventory</text>
  <line x1="432" y1="772" x2="474" y2="772" class="line" marker-end="url(#arrow)"/>

  <rect x="482" y="752" width="205" height="40" fill="#e7f6ef" stroke="#1f7a5a" stroke-width="2" rx="12"/>
  <text x="500" y="777" class="tiny green">Runtime Evidence Miner</text>
  <line x1="689" y1="772" x2="731" y2="772" class="line" marker-end="url(#arrow)"/>

  <rect x="739" y="752" width="185" height="40" class="chip"/>
  <text x="760" y="777" class="tiny blue">Program / Flow</text>
  <line x1="926" y1="772" x2="968" y2="772" class="line" marker-end="url(#arrow)"/>

  <rect x="976" y="752" width="160" height="40" class="chip"/>
  <text x="1000" y="777" class="tiny blue">Module / BRD</text>
  <line x1="1138" y1="772" x2="1180" y2="772" class="line" marker-end="url(#arrow)"/>

  <rect x="1188" y="752" width="150" height="40" class="chip"/>
  <text x="1215" y="777" class="tiny blue">Spec + SME</text>
  <line x1="1340" y1="772" x2="1382" y2="772" class="line" marker-end="url(#arrow)"/>

  <rect x="1390" y="752" width="115" height="40" fill="#fff5db" stroke="#b36b00" stroke-width="2" rx="12"/>
  <text x="1418" y="777" class="tiny orange">Atlas</text>

  <rect x="55" y="840" width="1490" height="34" fill="#101820" rx="14"/>
  <text x="88" y="862" class="small" fill="#ffffff">Core rule: skills are portable across Codex, Claude Code, and OpenCode. Canonical source remains under skills/&lt;skill-name&gt;/.</text>
</svg>
