<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-labelledby="title desc">
  <title id="title">Legacy Spec Factory to Atlas Engineering Delivery Hub overview</title>
  <desc id="desc">A whiteboard-style overview showing how IBM i evidence becomes an evidence-backed BRD, an SDD handoff, and downstream Atlas delivery artifacts.</desc>
  <defs>
    <style>
      .bg { fill: #fffaf0; }
      .ink { fill: #20242a; }
      .muted { fill: #5a6472; }
      .blue { fill: #0f4c81; }
      .green { fill: #1f7a5a; }
      .orange { fill: #b36b00; }
      .red { fill: #a43b3b; }
      .box { fill: #ffffff; stroke: #1d3557; stroke-width: 4; rx: 18; }
      .box2 { fill: #f8fbff; stroke: #0f4c81; stroke-width: 3; rx: 16; }
      .box3 { fill: #fff7e6; stroke: #b36b00; stroke-width: 3; rx: 16; }
      .field { fill: #e7f6ef; stroke: #1f7a5a; stroke-width: 2.5; rx: 14; }
      .repo { fill: #fff5db; stroke: #b36b00; stroke-width: 2.5; rx: 14; }
      .gate { fill: #fefefe; stroke: #57606f; stroke-width: 2.5; rx: 12; }
      .bridge { fill: #f1f7ff; stroke: #0f4c81; stroke-width: 4; rx: 18; }
      .line { stroke: #20242a; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke: #5a6472; stroke-width: 2.5; fill: none; stroke-dasharray: 8 8; }
      .title { font: 700 46px "Avenir Next", "Helvetica Neue", Arial, sans-serif; letter-spacing: 0; }
      .h2 { font: 700 27px "Avenir Next", "Helvetica Neue", Arial, sans-serif; }
      .h3 { font: 700 21px "Avenir Next", "Helvetica Neue", Arial, sans-serif; }
      .body { font: 500 18px "Avenir Next", "Helvetica Neue", Arial, sans-serif; }
      .small { font: 500 15px "Avenir Next", "Helvetica Neue", Arial, sans-serif; }
      .tiny { font: 600 13px "Avenir Next", "Helvetica Neue", Arial, sans-serif; }
      .pill { font: 700 13px "Avenir Next", "Helvetica Neue", Arial, sans-serif; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#20242a"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <path class="dash" d="M48 84 C240 60 440 78 620 68 S1010 60 1188 76 1440 92 1550 70"/>
  <text x="70" y="70" class="title ink">Legacy Spec Factory -&gt; Atlas Engineering Delivery Hub</text>
  <text x="72" y="108" class="body muted">Old IBM i behavior -&gt; evidence-backed BRD -&gt; approved SDD handoff -&gt; AI-native delivery</text>

  <rect x="50" y="145" width="640" height="612" class="box2"/>
  <text x="82" y="190" class="h2 blue">1. Legacy Spec Factory</text>
  <text x="82" y="218" class="body muted">Reverse understanding: code, runtime, SME knowledge -&gt; trusted BRD</text>

  <rect x="82" y="250" width="240" height="82" class="repo"/>
  <text x="102" y="280" class="h3 ink">Evidence Intake</text>
  <text x="102" y="307" class="small muted">EV-* IDs, redaction, manifest</text>

  <rect x="390" y="250" width="240" height="82" class="repo"/>
  <text x="410" y="280" class="h3 ink">Inventory</text>
  <text x="410" y="307" class="small muted">OBJ-* map, jobs, screens, files</text>

  <line x1="322" y1="291" x2="384" y2="291" class="line" marker-end="url(#arrow)"/>

  <rect x="82" y="375" width="548" height="98" class="field"/>
  <text x="102" y="407" class="h3 green">Runtime Evidence Miner</text>
  <text x="332" y="407" class="pill green">FIELD-PILOT READY 9.57</text>
  <text x="102" y="436" class="small muted">Approved job logs + spool/report files -&gt; runtime-evidence.jsonl</text>
  <text x="102" y="459" class="tiny muted">Does not infer business rules from one run; emits observed_in_runtime evidence only.</text>

  <line x1="510" y1="332" x2="510" y2="367" class="line" marker-end="url(#arrow)"/>

  <rect x="82" y="520" width="548" height="122" class="gate"/>
  <text x="102" y="552" class="h3 ink">IBM i Extraction Skills</text>
  <text x="102" y="582" class="small muted">program-analyzer, flow-analyzer, module-analyzer</text>
  <text x="102" y="607" class="small muted">data-model-analyzer, screen-report-analyzer</text>
  <text x="102" y="632" class="small muted">All facts keep evidence tags and unresolved TBDs.</text>

  <line x1="356" y1="473" x2="356" y2="512" class="line" marker-end="url(#arrow)"/>

  <rect x="82" y="682" width="548" height="48" class="field"/>
  <text x="102" y="713" class="h3 green">BRD Writer + SME Review + Spec Writer</text>
  <line x1="356" y1="642" x2="356" y2="674" class="line" marker-end="url(#arrow)"/>

  <rect x="735" y="355" width="180" height="168" class="bridge"/>
  <text x="760" y="392" class="h3 blue">Bridge</text>
  <text x="760" y="425" class="small muted">traceability</text>
  <text x="760" y="448" class="small muted">packager</text>
  <text x="760" y="478" class="small muted">brd-to-sdd</text>
  <text x="760" y="501" class="small muted">handoff</text>

  <line x1="630" y1="706" x2="820" y2="530" class="line" marker-end="url(#arrow)"/>
  <line x1="915" y1="439" x2="972" y2="439" class="line" marker-end="url(#arrow)"/>

  <rect x="970" y="145" width="580" height="612" class="box3"/>
  <text x="1002" y="190" class="h2 orange">2. Atlas Engineering Delivery Hub</text>
  <text x="1002" y="218" class="body muted">Forward SDD delivery: approved BRD -&gt; design -&gt; code -&gt; tests</text>

  <rect x="1002" y="252" width="220" height="78" class="gate"/>
  <text x="1022" y="282" class="h3 ink">Requirements</text>
  <text x="1022" y="307" class="small muted">req-to-user-story</text>

  <rect x="1290" y="252" width="220" height="78" class="gate"/>
  <text x="1310" y="282" class="h3 ink">Spec</text>
  <text x="1310" y="307" class="small muted">user-story-to-spec</text>

  <rect x="1002" y="375" width="220" height="78" class="gate"/>
  <text x="1022" y="405" class="h3 ink">Architecture</text>
  <text x="1022" y="430" class="small muted">spec-to-architecture</text>

  <rect x="1290" y="375" width="220" height="78" class="gate"/>
  <text x="1310" y="405" class="h3 ink">Design</text>
  <text x="1310" y="430" class="small muted">architecture-to-design</text>

  <rect x="1002" y="498" width="220" height="78" class="gate"/>
  <text x="1022" y="528" class="h3 ink">Tasks</text>
  <text x="1022" y="553" class="small muted">design-to-tasks</text>

  <rect x="1290" y="498" width="220" height="78" class="gate"/>
  <text x="1310" y="528" class="h3 ink">Implementation</text>
  <text x="1310" y="553" class="small muted">tasks-to-code</text>

  <rect x="1002" y="624" width="508" height="76" class="field"/>
  <text x="1022" y="654" class="h3 green">Review Gates</text>
  <text x="1022" y="680" class="small muted">review-doc-quality, review-code-against-design, architecture-review</text>

  <line x1="1222" y1="291" x2="1282" y2="291" class="line" marker-end="url(#arrow)"/>
  <line x1="1400" y1="330" x2="1400" y2="367" class="line" marker-end="url(#arrow)"/>
  <line x1="1290" y1="414" x2="1230" y2="414" class="line" marker-end="url(#arrow)"/>
  <line x1="1112" y1="453" x2="1112" y2="490" class="line" marker-end="url(#arrow)"/>
  <line x1="1222" y1="537" x2="1282" y2="537" class="line" marker-end="url(#arrow)"/>
  <line x1="1400" y1="576" x2="1400" y2="616" class="line" marker-end="url(#arrow)"/>

  <rect x="50" y="800" width="1500" height="56" fill="#101820" rx="18"/>
  <text x="82" y="835" class="body" fill="#ffffff">19 canonical skills | 10 field-pilot ready | 9 repo-ready | Traceability: EV -&gt; BEH -&gt; BR -&gt; DEC -&gt; REQ -&gt; SPEC -&gt; TEST -&gt; CODE</text>
  <text x="1215" y="835" class="body" fill="#ffd166">No Output, No Pass. No Pass, No Next.</text>
</svg>
