# BRD Package review decision write-back.
# Generated by legacy-sme-review-facilitator in Conversation Review Mode.

review_id: "REVIEW-<CAPABILITY-SLUG>-<NNN>"
review_mode: "conversation"
review_date: "YYYY-MM-DD"
capability_slug: "<CAPABILITY-SLUG>"
brd_package_path: "05_brds/<CAPABILITY-SLUG>/"
source_review_package: "07_sme_reviews/<CAPABILITY-SLUG>/<REVIEW-SLUG>/"

sme_reviewer:
  name: "<SME full name>"
  role: "<SME role/title>"
  organization: "<org>"
  reviewed_at: "YYYY-MM-DD"

summary:
  total_items: 0
  confirmed: 0
  rejected: 0
  deferred: 0
  needs_more_evidence: 0
  blocking_items: 0
  required_functional_sections:
    total: 9
    accepted: 0
    accepted_with_tbd: 0
    blocked: 0
  ready_for_spec_writer: false

functional_analysis_coverage:
  - target_id: "BRD-<CAPABILITY-SLUG>-001#section-01"
    section_number: 1
    section_name: "Function Purpose"
    coverage_decision: "accepted"
    # One of: accepted, accepted_with_tbd, blocked, needs_more_evidence
    raw_chat_answer: "<raw SME answer from chat>"
    related_tbd_ids: []
    referenced_evidence:
      - "EV-<CAPABILITY-SLUG>-001"
    reviewed_by: "<SME initials>"
    reviewed_at: "YYYY-MM-DD"

  - target_id: "BRD-<CAPABILITY-SLUG>-001#section-03"
    section_number: 3
    section_name: "Channels"
    coverage_decision: "accepted_with_tbd"
    raw_chat_answer: "<raw SME answer from chat>"
    related_tbd_ids:
      - "TBD-<CAPABILITY-SLUG>-001"
    referenced_evidence:
      - "EV-<CAPABILITY-SLUG>-002"
    reviewed_by: "<SME initials>"
    reviewed_at: "YYYY-MM-DD"

decisions:
  - target_id: "BR-<CAPABILITY-SLUG>-001"
    target_type: "inferred_rule"
    question: "<question asked in chat>"
    ai_suggested_decision: "confirm_for_spec_promotion"
    raw_chat_answer: "<raw SME answer from chat>"
    sme_decision: "confirmed"
    # One of: confirmed, rejected, deferred, marked_non_blocking,
    #         marked_blocking, split_into_follow_ups, needs_more_evidence
    sme_comment: "<normalized SME comment>"
    referenced_evidence:
      - "EV-<CAPABILITY-SLUG>-001"
    write_back_targets:
      - "brd-review.md"
      - "traceability.md"
    downstream_candidate: "spec_rule"
    # One of: spec_rule, acceptance_criteria, golden_master_case, sow_scope,
    #         deferred, none
    reviewed_by: "<SME initials>"
    reviewed_at: "YYYY-MM-DD"

  - target_id: "VAL-<CAPABILITY-SLUG>-001"
    target_type: "validation_scenario"
    question: "<question asked in chat>"
    ai_suggested_decision: "confirm"
    raw_chat_answer: "<raw SME answer from chat>"
    sme_decision: "confirmed"
    sme_comment: "<normalized SME comment>"
    referenced_evidence:
      - "EV-<CAPABILITY-SLUG>-002"
    write_back_targets:
      - "validation-scenarios.md"
      - "traceability.md"
    downstream_candidate: "acceptance_criteria"
    reviewed_by: "<SME initials>"
    reviewed_at: "YYYY-MM-DD"

follow_ups:
  - target_id: "TBD-<CAPABILITY-SLUG>-001"
    owner: "<name or role>"
    target_date: "YYYY-MM-DD"
    next_step: "<what must happen next>"
    blocks_spec_writer: true

signoff:
  status: "pending"
  # One of: pending, signed_off, signed_off_with_non_blocking_followups, blocked
  statement: |
    <SME approval statement copied or summarized from chat confirmation>
