#
# Copy this file into a project/team config location and edit the values for
# that delivery repository. The v0.4 merger uses the complete reader-first
# program-analysis.md as semantic primary input and sidecars for readiness and
# reconciliation.
#
# Program-set core review supports two explicit artifact modes:
# - current_run (default): program_artifact_resolution_profile resolves
#   folder/name patterns under the current working root; output writes to the
#   named working branch; no remote-main or prior-run artifact satisfies the
#   default run.
# - approved_document_repo: after an all-program scan has been reviewed and
#   merged into the document/delivery repo, an SME can clone that repo locally
#   and use --artifact-repo-mode approved_document_repo to assemble a selected
#   program-set review from approved existing artifacts without re-scanning source.

program_artifact_resolution_profile:
  repo: CH-WPS-LENDING-CARDS/legacy-modernization-delivery
  module_roots:
    - modules/*
  program_folder_patterns:
    - modules/*/{PROGRAM}
  artifact_file_patterns:
    - "{PROGRAM}-program-analysis.md"
    - program-analysis.md
    - "{PROGRAM}-program-analysis-summary.yaml"
    - "{PROGRAM}-source-index.yaml"
    - "{PROGRAM}-routine-index.md"
    - "{PROGRAM}-routine-logic-details.md"
    - "{PROGRAM}-routine-logic-details.yaml"
    - "{PROGRAM}-message-inventory.yaml"
    - "{PROGRAM}-program-analysis-*.md"
    - program-analysis-*.md
    - program-analysis-summary.yaml
    - source-index.yaml
    - routine-index.md
    - routine-logic-details.md
    - routine-logic-details.yaml
    - message-inventory.yaml
  program_name_normalization:
    case: upper
    preserve_prefixes:
      - "@"
    exact_folder_name_match: true

# Optional compatibility section for single-program analyzer central preflight.
# The program-flow builder prefers program_artifact_resolution_profile above.
delivery_artifact_lookup_profile:
  repo: CH-WPS-LENDING-CARDS/legacy-modernization-delivery
  branch: main
  remote_ref: origin/main
  lookup_method:
    type: git_method_2
    sparse_checkout:
      - modules
  module_roots:
    - modules/*
  program_folder_patterns:
    - modules/*/{PROGRAM}
  artifact_file_patterns:
    - "{PROGRAM}-program-analysis.md"
    - "{PROGRAM}-program-analysis-*.md"
    - "{PROGRAM}-program-analysis-summary.yaml"
    - "{PROGRAM}-routine-logic-details.yaml"
    - "{PROGRAM}-message-inventory.yaml"
    - program-analysis.md
    - program-analysis-*.md
    - program-analysis-summary.yaml
    - routine-logic-details.yaml
    - message-inventory.yaml
  program_name_normalization:
    case: upper
    preserve_prefixes:
      - "@"
    exact_folder_name_match: true

delivery_workspace_profile:
  repo: CH-WPS-LENDING-CARDS/legacy-modernization-delivery
  branch_mode: use_or_create_provided
  working_branch_required: true
  working_branch_pattern: develop-{PERSON}
  allowed_branch_patterns:
    - develop-*
  create_from: origin/main
  write_to_main: false

  # Program artifacts are written to their tier-specific roots after source scan.
  program_tier_roots:
    large_extreme_program: modules/CAP-ID-0001-large_extreme_program
    complex_normal_program: modules/CAP-ID-0002-complex_normal_program
    normal_program: modules/CAP-ID-0003-normal_program

  # Program-set reviews are cross-tier and live under one configured parent.
  program_set_review_parent: modules/CAP-ID-0004-program_set_reviews
  program_set_review_path_pattern: "{FLOW_SLUG}--{PROGRAM_SET_SLUG}"
  review_slug_source: review_name
  # Identity is stable by flow slug plus normalized program-set identity.
  # --output-dir is a parent; the resolver appends this path exactly once.
  review_slug_collision_strategy: stable_program_set_identity

  merger_output_contract:
    artifact_version: "0.4"
    generator_version: "0.4.0"
    output_dir_semantics: parent
    append_folder_slug_exactly_once: true
    preparation_files:
      - program-list.txt
      - program-set-core-input-manifest.yaml
      - program-set-artifact-readiness.yaml
      - program-set-reader-first-source-pack.md
      - program-set-core-facts.yaml
      - program-set-core-coverage.yaml
    formal_review_filename_pattern: "{FOLDER_SLUG}--sme-core-review.md"
    generic_review_alias: false
    deterministic_builder_writes_formal_review: false
    initial_coverage_status: pending

  artifact_readiness_gate:
    policy: core_reader_first_lenient
    reuse_upstream_program_final_validator: true
    terminal_statuses:
      - approved
      - approved_with_non_blocking_tbd
    required_reader_first_sections:
      - Program Reading Summary
      - Calculation Logic
      - Validation Logic
      - Exception Handling
      - Message Inventory
    # Only a missing/meaningless core reader-first section blocks early intake.
    # The remaining checks are preserved as pending_findings and are enforced
    # again by the strict final validator before formal review handoff.
    block_pending_deep_read: false
    block_non_terminal_batches: false
    block_placeholders: core_sections_only
    block_unresolved_message_descriptions: false

  output_rules:
    analyzed_this_run: read_from_working_root
    reused_same_run: read_same_run_artifact
    reused_artifact_repo: read_approved_document_repo_artifact
    pending_source: scan_source_then_write_to_working_branch
    blocked_missing_source: record_blocker_tbd

source_inventory_profile:
  default_cache_dir: outputs/repo-scan
  program_list_filename: program-list.csv
  scan_summary_filename: scan-summary.yaml
  freshness_policy: clean_git_head_must_match
  # The merger never launches a whole-repository scan as missing-program
  # recovery. A missing/stale cache blocks targeted queue creation until the
  # caller supplies a fresh inventory produced outside this run.
  missing_or_stale_action: provide_fresh_inventory_or_exact_source_mapping
  automatic_repo_scan: false

# The merger defaults to standard_reader_first. minimal_reader_first is
# explicit opt-in and moves messages to audit coverage; it never drops message
# facts or exact literals.
core_review_profiles:
  minimal_reader_first:
    name: minimal_reader_first
    core_sections:
      - Program Set Reading Summary
      - Cross-Program Processing Overview
      - Calculation Logic
      - Validation Logic
      - Exception Handling
    include_message_inventory: false
    message_coverage_section: Message Coverage Control
    retain_all_message_facts: true
    include_audit_sections: true
  standard_reader_first:
    name: standard_reader_first
    core_sections:
      - Program Set Reading Summary
      - Cross-Program Processing Overview
      - Calculation Logic
      - Validation Logic
      - Exception Handling
      - Message Inventory
    include_message_inventory: true
    message_coverage_section: Message Inventory
    retain_all_message_facts: true
    include_audit_sections: true

core_review_profile:
  name: standard_reader_first
  core_sections:
    - Program Set Reading Summary
    - Cross-Program Processing Overview
    - Calculation Logic
    - Validation Logic
    - Exception Handling
    - Message Inventory
  include_message_inventory: true
  message_coverage_section: Message Inventory
  retain_all_message_facts: true
  include_audit_sections: true

coverage_profile:
  source_fact_id_required: true
  legal_dispositions:
    - included
    - merged
    - excluded_non_core
    - pending
  final_pending_allowed: false
  review_anchor_required_for:
    - included
    - merged
  five_way_reconciliation:
    - manifest
    - source_pack
    - core_facts
    - coverage
    - formal_review
