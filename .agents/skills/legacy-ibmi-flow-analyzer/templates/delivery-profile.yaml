# Copy this file into a project/team config location and edit the values for
# that delivery repository.
# Program-flow core review supports two explicit artifact modes:
# - current_run (default): program_artifact_resolution_profile resolves
#   folder/name patterns under the current working root; output writes to the
#   named working branch; no remote-main or prior-run artifact satisfies the
#   default flow run.
# - approved_document_repo: after an all-program scan has been reviewed and
#   merged into the document/delivery repo, an SME can clone that repo locally
#   and use --artifact-repo-mode approved_document_repo to assemble a selected
#   program flow from approved existing artifacts without re-scanning source.

program_artifact_resolution_profile:
  repo: CH-WPS-LENDING-CARDS/legacy-modernization-delivery
  module_roots:
    - modules/*
  program_folder_patterns:
    - modules/*/{PROGRAM}
  artifact_file_patterns:
    - "{PROGRAM}-program-analysis.md"
    - "{PROGRAM}-program-analysis-*.md"
    - "{PROGRAM}-program-analysis-summary.yaml"
    - "{PROGRAM}-routine-logic-details.yaml"
    - "{PROGRAM}-message-inventory.yaml"
    - program-analysis.md
    - program-analysis-*.md
    - program-analysis-summary.yaml
    - routine-logic-details.yaml
    - message-inventory.yaml
  program_name_normalization:
    case: upper
    preserve_prefixes:
      - "@"
    exact_folder_name_match: true

# Optional compatibility section for single-program analyzer central preflight.
# The program-flow builder prefers program_artifact_resolution_profile above.
delivery_artifact_lookup_profile:
  repo: CH-WPS-LENDING-CARDS/legacy-modernization-delivery
  branch: main
  remote_ref: origin/main
  lookup_method:
    type: git_method_2
    sparse_checkout:
      - modules
  module_roots:
    - modules/*
  program_folder_patterns:
    - modules/*/{PROGRAM}
  artifact_file_patterns:
    - "{PROGRAM}-program-analysis.md"
    - "{PROGRAM}-program-analysis-*.md"
    - "{PROGRAM}-program-analysis-summary.yaml"
    - "{PROGRAM}-routine-logic-details.yaml"
    - "{PROGRAM}-message-inventory.yaml"
    - program-analysis.md
    - program-analysis-*.md
    - program-analysis-summary.yaml
    - routine-logic-details.yaml
    - message-inventory.yaml
  program_name_normalization:
    case: upper
    preserve_prefixes:
      - "@"
    exact_folder_name_match: true

delivery_workspace_profile:
  repo: CH-WPS-LENDING-CARDS/legacy-modernization-delivery
  branch_mode: use_or_create_provided
  working_branch_required: true
  working_branch_pattern: develop-{PERSON}
  allowed_branch_patterns:
    - develop-*
  create_from: origin/main
  write_to_main: false

  # Program artifacts are written to their tier-specific roots after source scan.
  program_tier_roots:
    large_extreme_program: modules/CAP-ID-0001-large_extreme_program
    complex_normal_program: modules/CAP-ID-0002-complex_normal_program
    normal_program: modules/CAP-ID-0003-normal_program

  # Program-set reviews are cross-tier and live under one configured parent.
  program_set_review_parent: modules/CAP-ID-0004-program_set_reviews
  program_set_review_path_pattern: "{FLOW_SLUG}--{PROGRAM_SET_SLUG}"
  review_slug_source: review_name
  review_slug_collision_strategy: append_sequence

  output_rules:
    analyzed_this_run: read_from_working_root
    reused_same_run: read_same_run_artifact
    reused_artifact_repo: read_approved_document_repo_artifact
    pending_source: scan_source_then_write_to_working_branch
    blocked_missing_source: record_blocker_tbd

source_inventory_profile:
  default_cache_dir: outputs/repo-scan
  program_list_filename: program-list.csv
  scan_summary_filename: scan-summary.yaml
  freshness_policy: clean_git_head_must_match
  missing_or_stale_action: rerun_repo_inventory_scan

# The core_review_only assembly mode defaults to the standard reader-first
# profile so the main review includes the exact Message Inventory surface.
# Keep minimal_reader_first available for teams that explicitly want a more
# compact reading path.
core_review_profiles:
  minimal_reader_first:
    name: minimal_reader_first
    core_sections:
      - Program Set Reading Summary
      - Cross-Program Processing Overview
      - Calculation Logic
      - Validation Logic
      - Exception Handling
    include_message_inventory: false
    include_audit_sections: true
  standard_reader_first:
    name: standard_reader_first
    core_sections:
      - Program Set Reading Summary
      - Cross-Program Processing Overview
      - Calculation Logic
      - Validation Logic
      - Exception Handling
      - Message Inventory
    include_message_inventory: true
    include_audit_sections: true

core_review_profile:
  name: standard_reader_first
  core_sections:
    - Program Set Reading Summary
    - Cross-Program Processing Overview
    - Calculation Logic
    - Validation Logic
    - Exception Handling
    - Message Inventory
  include_message_inventory: true
  include_audit_sections: true
