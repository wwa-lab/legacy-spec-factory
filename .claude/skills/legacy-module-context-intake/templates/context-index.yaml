schema_version: "0.1"
package_type: module_context_intake

module:
  slug: "<MODULE-SLUG>"
  module_id: "MODULE-<MODULE-SLUG>-001"
  business_name: "<Business module name>"
  scope_statement: "<SME-confirmed or draft scope statement>"
  owner: "<Module owner / SME role>"
  source_state: "draft" # draft | sme_confirmed | approved_with_non_blocking_tbd

intake:
  skill: "legacy-module-context-intake"
  version: "v0.1.12"
  generated_at: "<YYYY-MM-DDTHH:MM:SSZ>"
  status: "blocked_pending_evidence" # ready_for_module_analysis | ready_with_warnings | blocked_pending_evidence | blocked_pending_contradiction_review | legacy: blocked_pending_scope
  decision_reason: "<Why this status was selected>"
  downstream_next_step: "legacy-ibmi-evidence-intake" # legacy-ibmi-module-analyzer when ready; legacy-brd-writer for internal_poc; evidence-intake when blocked

run_validation:
  structural_status: "not_run" # pass | pass_with_warnings | blocked | not_run | tool_unavailable | tool_unavailable_hosted_agent
  structural_method: "not_run" # validator | manual_review | hosted_agent_skipped | not_run
  validator_command: "python3 skills/legacy-module-context-intake/scripts/validate_context_package.py 00_context_packages/<MODULE-SLUG>"
  artifact_preview_status: "not_requested" # not_requested | skipped_large_package | passed | failed | timed_out
  artifact_preview_reason: "Preview is optional; context Markdown files and evidence maps are the canonical package."
  completion_boundary: "stop_after_writeback"

evidence_authorization:
  status: "unknown" # approved | synthetic_non_production | public | blocked | unknown
  evidence_manifest: null
  redaction_notes: "<authorization / redaction note>"

rag_runs: []

document_evidence_inputs: []

input_files: []

output_files:
  rag_evidence_map: "rag-evidence-map.md"
  contradiction_log: "contradiction-log.md"
  open_questions: "open-questions.md"

coverage:
  context_coverage_ready: false
  source_snippets_mapped: false
  dictionary_context_mapped: false
  contradictions_carried_forward: false
  open_questions_carried_forward: false
  coverage_dimensions:
    business_process: "absent" # absent | partial | usable | strong
    system_interfaces: "absent" # absent | partial | usable | strong
    program_anchors: "absent" # absent | partial | usable | strong
    data_anchors: "absent" # absent | partial | usable | strong
  technical_anchor_coverage:
    program_anchors: "absent" # absent | partial | usable | strong
    data_anchors: "absent" # absent | partial | usable | strong
    object_map_present: false
    code_backed_analysis_present: false
  brd_functional_analysis_hints:
    function_purpose: "absent"
    business_scenarios: "absent"
    channels: "absent"
    user_touchpoints: "absent"
    system_interfaces: "absent"
    process_flow: "absent"
    validation_rules: "absent"
    error_handling: "absent"
    dependencies: "absent"
    optional_security_auth: "absent"
    optional_workflow_design_notes: "absent"
    optional_source_document_mapping: "absent"

gates:
  evidence_authorization_gate: "blocked" # pass | warning | blocked
  module_scope_gate: "blocked"
  context_coverage_gate: "blocked"
  contradiction_visibility_gate: "blocked"
  rule_promotion_gate: "blocked" # blocked when evidence_authorization is unknown; set to pass only after authorization resolves

blocking_items:
  - id: "TBD-<MODULE-SLUG>-001"
    reason: "<Why this item blocks handoff>"
    owner: "<Skill or role responsible for resolution>"
