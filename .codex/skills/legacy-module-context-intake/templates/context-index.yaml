schema_version: "0.1"
package_type: module_context_intake

module:
  slug: "<MODULE-SLUG>"
  module_id: "MODULE-<MODULE-SLUG>-001"
  business_name: "<Business module name>"
  scope_statement: "<SME-confirmed or draft scope statement>"
  owner: "<Module owner / SME role>"
  source_state: "draft" # draft | sme_confirmed | approved_with_non_blocking_tbd

intake:
  skill: "legacy-module-context-intake"
  version: "v0.1.0"
  generated_at: "<YYYY-MM-DDTHH:MM:SSZ>"
  status: "blocked_pending_evidence" # ready_for_module_analysis | ready_with_warnings | blocked_pending_evidence | blocked_pending_scope | blocked_pending_contradiction_review
  decision_reason: "<Why this status was selected>"
  downstream_next_step: "legacy-ibmi-evidence-intake" # legacy-ibmi-module-analyzer when ready; evidence-intake when blocked

evidence_authorization:
  status: "unknown" # approved | synthetic_non_production | public | blocked | unknown
  evidence_manifest: null
  redaction_notes: "<authorization / redaction note>"

rag_runs: []

input_files: []

output_files:
  operation_business_flow: "01-operation-business-flow.md"
  system_flow: "02-system-flow.md"
  program_flow: "03-program-flow.md"
  data_flow: "04-data-flow.md"
  rag_evidence_map: "rag-evidence-map.md"
  contradiction_log: "contradiction-log.md"
  open_questions: "open-questions.md"

coverage:
  four_views_present: false
  source_snippets_mapped: false
  dictionary_context_mapped: false
  contradictions_carried_forward: false
  open_questions_carried_forward: false

gates:
  evidence_authorization_gate: "blocked" # pass | warning | blocked
  module_scope_gate: "blocked"
  four_view_gate: "blocked"
  contradiction_visibility_gate: "blocked"
  rule_promotion_gate: "blocked" # blocked when evidence_authorization is unknown; set to pass only after authorization resolves

blocking_items:
  - id: "TBD-<MODULE-SLUG>-001"
    reason: "<Why this item blocks handoff>"
    owner: "<Skill or role responsible for resolution>"
